{% extends "base.html" %}
{% block content %}

<div class="list-box">
<h2>Notifications</h2>

{% if notifications %}
    {% for notification in notifications %}
    <div class="notification-item">
        {{ notification.message }}
    </div>
    {% endfor %}
{% else %}
<p>No notifications</p>
{% endif %}

</div>

{% endblock %}
